name: Travel Time Tracker

on:
  schedule:
    - cron: '*/5 5 * * 1-5'
    - cron: '*/15 6-12 * * 1-5'
    - cron: '*/5 13 * * 1-5'
    - cron: '*/15 14-15 * * 1-5'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    concurrency:
      group: travel-tracker
      cancel-in-progress: false
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser

      - name: Run travel time scraper
        env:
          MAPS_URL: ${{ secrets.MAPS_URL }}
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config user.name "Travel Bot"
          git config user.email "bot@noreply.github.com"
          git add travel_log.txt
          git diff --staged --quiet || git commit -m "📍 $(date +'%d.%m.%Y %H:%M') - log update"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            sleep 5
          done
