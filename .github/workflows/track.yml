name: Travel Time Tracker

on:
  schedule:
    # Svakih 15 minuta, radnim danima, 6-20h (UTC je 2 sata iza HR ljetnog vremena)
    # 6:00-20:00 HR = 4:00-18:00 UTC (ljeto) ili 5:00-19:00 UTC (zima)
    # Stavi širi raspon da pokriješ oboje:
    - cron: '*/15 4-19 * * 1-5'
  
  # Omogući ručno pokretanje za testiranje
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser

      - name: Run travel time scraper
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config user.name "Travel Bot"
          git config user.email "bot@noreply.github.com"
          git add travel_log.txt
          # Commitaj samo ako ima promjena
          git diff --staged --quiet || git commit -m "📍 $(date +'%d.%m.%Y %H:%M') - travel time update"
          git push
