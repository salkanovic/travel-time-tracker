name: Travel Time Tracker

on:
  schedule:
    # HR vrijeme = UTC+2 (CEST ljeto)
    # 7:00-7:59 HR (= 5:00-5:59 UTC) → svaku minutu
    - cron: '* 5 * * 1-5'
    # 8:00-14:59 HR (= 6:00-12:59 UTC) → svake 3 min
    - cron: '*/3 6-12 * * 1-5'
    # 15:00-15:59 HR (= 13:00-13:59 UTC) → svaku minutu
    - cron: '* 13 * * 1-5'
    # 16:00-17:00 HR (= 14:00-15:00 UTC) → svake 3 min
    - cron: '*/3 14-15 * * 1-5'
  
  # Omogući ručno pokretanje za testiranje
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    concurrency:
      group: travel-tracker
      cancel-in-progress: false
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python + cache
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install selenium

      - name: Run travel time scraper
        env:
          MAPS_URL: ${{ secrets.MAPS_URL }}
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config user.name "Travel Bot"
          git config user.email "bot@noreply.github.com"
          git add travel_log.txt
          git diff --staged --quiet || git commit -m "📍 $(date +'%d.%m.%Y %H:%M') - log update"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            sleep 5
          done

      - name: Upload log to Hostinger via FTP
        run: |
          curl -T travel_log.txt \
            --ftp-create-dirs \
            -u "${{ secrets.FTP_USER }}:${{ secrets.FTP_PASS }}" \
            "ftp://92.113.18.42/public_html/maps/data/travel_log.txt"
