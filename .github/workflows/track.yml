name: Travel Time Tracker

on:
  schedule:
    # HR vrijeme = UTC+2 (CEST ljeto)
    # 7:00-7:55 HR (= 5:00-5:55 UTC) → svakih 5 min
    - cron: '*/5 5 * * 1-5'
    # 8:00-14:45 HR (= 6:00-12:45 UTC) → svakih 15 min
    - cron: '*/15 6-12 * * 1-5'
    # 15:00-15:55 HR (= 13:00-13:55 UTC) → svakih 5 min
    - cron: '*/5 13 * * 1-5'
    # 16:00-17:00 HR (= 14:00-15:00 UTC) → svakih 15 min
    - cron: '*/15 14-15 * * 1-5'
  
  # Omogući ručno pokretanje za testiranje
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    concurrency:
      group: travel-tracker
      cancel-in-progress: false
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install selenium webdriver-manager

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable || sudo apt-get install -y chromium-browser

      - name: Run travel time scraper
        run: python scraper.py

      - name: Commit and push results
        run: |
          git config user.name "Travel Bot"
          git config user.email "bot@noreply.github.com"
          git add travel_log.txt
          git diff --staged --quiet || git commit -m "📍 $(date +'%d.%m.%Y %H:%M') - travel time update"
          # Pull najnovije promjene pa pushaj (retry 3x za slučaj preklapanja)
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "Retry $i..."
            sleep 5
          done
